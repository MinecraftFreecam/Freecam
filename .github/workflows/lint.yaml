name: Lint

on:
  pull_request:

# Group workflow runs by ref.
# New runs cancel any pending run.
# In-progress runs are allowed to complete.
concurrency:
  group: lint-${{ github.ref }}

defaults:
  run:
    shell: bash

jobs:
  lint:
    runs-on: ubuntu-slim
    timeout-minutes: 30

    env:
      RUFF_OUTPUT_FORMAT: github

    steps:
      - name: Checkout required files
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            ci
            CHANGELOG.md
            metadata.toml
            pyproject.toml
            uv.lock
          sparse-checkout-cone-mode: false

      - uses: actions/setup-python@v6
        with:
          python-version-file: pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install CI dev dependencies
        run: uv sync --locked --group dev

      - name: Check Python
        run: uv run check

      - name: Lint changelog
        run: uv run lint-changelog