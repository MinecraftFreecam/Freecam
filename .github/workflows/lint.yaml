name: Lint

on:
  pull_request:

defaults:
  run:
    shell: bash

jobs:
  lint:
    runs-on: ubuntu-slim

    timeout-minutes: 30

    steps:
      - name: Checkout required files
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            ci
            CHANGELOG.md
            metadata.toml
            poetry.lock
            pyproject.toml
          sparse-checkout-cone-mode: false

      - name: Install poetry
        run: pipx install poetry==2.3.0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12' # pre-installed
          cache: poetry

      - name: Install CI dependencies
        run: poetry install

      - name: Run tests
        run: poetry run pytest

      - name: Lint changelog
        run: poetry run ci/lint_changelog.py