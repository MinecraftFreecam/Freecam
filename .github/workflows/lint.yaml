name: Lint

on:
  pull_request:

defaults:
  run:
    shell: bash

jobs:
  lint:
    runs-on: ubuntu-slim
    timeout-minutes: 30

    env:
      RUFF_OUTPUT_FORMAT: github

    steps:
      - name: Checkout required files
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            ci
            CHANGELOG.md
            metadata.toml
            pyproject.toml
            uv.lock
          sparse-checkout-cone-mode: false

      - uses: actions/setup-python@v6
        with:
          python-version-file: pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install CI dev dependencies
        run: uv sync --locked --group dev

      - name: Run tests
        run: uv run pytest

      - name: Python Formatting
        run: uv run ruff format --check

      - name: Lint Python
        run: uv run ruff check

      - name: Lint changelog
        run: uv run lint-changelog