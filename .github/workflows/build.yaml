name: Build

on:
  push:
  pull_request:

# Only allow running one build per branch at a time to optimise cache hits
concurrency:
  group: builds-${{ github.ref }}

defaults:
  run:
    shell: bash

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - name: Checkout metadata files
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            metadata.toml
            stonecutter.versions.toml
          sparse-checkout-cone-mode: false

      - name: Read project version
        id: version
        run: |
          version=$(yq .mod.version metadata.toml)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Generate build matrix
        id: matrix
        env:
          version: ${{ steps.version.outputs.version }}
        run: |
          yq --output-format=json --indent=0 '
              (
                to_entries | map(
                  .key as $mc
                  | .value
                  | {
                      "name": "Build \($mc)",
                      "gradle_args": (
                        (.projects - ["common"])
                        | map(["", ., $mc, "buildAndCollect"] | join(":"))
                      ),
                      "upload_name": "freecam-\($mc)-builds",
                      "upload_path": "build/libs/\(strenv(version))/*.jar"
                    }
                )
              )
              +
              [
                {
                  "name": "Build logic tests",
                  "gradle_args": ["--project-dir", "build-logic", ":check"]
                }
              ]
          ' stonecutter.versions.toml > matrix.json
          echo "matrix=$(cat matrix.json)" >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest

    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v6

      # Install Java used by the Gradle wrapper.
      # The JVM used to build is installed separately by the foojay resolver.
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v5
        with:
          # TODO: Revert to default (`!= main`) when merging `stonecutter` branch
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/stonecutter' }}

      - name: Run gradle
        env:
          args: ${{ toJSON(matrix.gradle_args) }}
        run: |
          # Build each task
          mapfile -t args < <( echo "$args" | jq --raw-output .[] )
          ./gradlew "${args[@]}"

      - name: Upload build
        if: matrix.upload_name && matrix.upload_path
        id: upload
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.upload_name }}
          path: ${{ matrix.upload_path }}
          retention-days: 90
          if-no-files-found: error

      - name: Upload summary
        if: ${{ steps.upload.outputs.artifact-url }}
        shell: bash
        env:
          upload_name: ${{ matrix.upload_name }}
          upload_path: ${{ matrix.upload_path }}
          upload_url: ${{ steps.upload.outputs.artifact-url }}
        run: |
          {
            echo "## Build artifacts"
            echo
            echo "**Files:**"
            echo
            (
              shopt -s nullglob
              IFS=$'\n'
              for file in $upload_path; do
                echo "- \`$(basename "$file")\`"
              done
            )
            echo
            echo "**Download:** [$upload_name.zip]($upload_url)"
            echo
            echo "_Expires on **$(date --utc --date=+90days +%F)** (UTC)._"
            echo
          } >> "$GITHUB_STEP_SUMMARY"
