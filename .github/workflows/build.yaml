name: Build

on:
  push:
  pull_request:

# Only allow running one build per branch at a time to optimise cache hits
concurrency:
  group: builds-${{ github.ref }}

defaults:
  run:
    shell: bash

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.result }}
      matrix: ${{ steps.matrix.outputs.result }}

    steps:
      - name: Checkout metadata files
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            metadata.toml
            stonecutter.versions.toml
          sparse-checkout-cone-mode: false

      - name: Read project version
        id: version
        uses: mikefarah/yq@v4
        with:
          cmd: |
            yq .mod.version metadata.toml

      - name: Write project version env
        env:
          version: ${{ steps.version.outputs.result }}
        run: |
          echo "version=$version" >> "$GITHUB_ENV"

      - name: Generate build matrix
        id: matrix
        uses: mikefarah/yq@v4
        with:
          cmd: |
            yq --output-format=json --indent=0 '
              to_entries | map(
                .key as $mc 
                | .value
                | {
                    "name": "Build \($mc)",
                    "tasks": (
                      (.projects - ["common"])
                      | map(["", ., $mc, "buildAndCollect"] | join(":"))
                    ),
                    "upload_name": "freecam-\($mc)-builds",
                    "upload_path": "build/libs/\(strenv(version))/*.jar"
                  }
              )
            ' stonecutter.versions.toml

  build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest

    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v6

      # Install Java used by the Gradle wrapper.
      # The JVM used to build is installed separately by the foojay resolver.
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v5

      - name: Run gradle
        env:
          tasks: ${{ toJSON(matrix.tasks) }}
        run: |
          # Build each task
          mapfile -t tasks < <( echo "$tasks" | jq --compact-output . )
          ./gradlew "${tasks[@]}"

      - name: Upload build
        if: matrix.upload_name && matrix.upload_path
        id: upload
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.upload_name }}
          path: ${{ matrix.upload_path }}
          retention-days: 90
          if-no-files-found: error

      - name: Upload summary
        if: ${{ steps.upload.outputs.artifact-url }}
        shell: bash
        env:
          upload_name: ${{ matrix.upload_name }}
          upload_path: ${{ matrix.upload_path }}
          upload_url: ${{ steps.upload.outputs.artifact-url }}
        run: |
          shopt -s nullglob
          {
            echo "## Build artifacts"
            echo
            echo "**Files:**"
            echo
            for file in $upload_path; do
              echo "- \`$(basename "$file")\`"
            done
            echo
            echo "**Download:** [$upload_name.zip]($upload_url)"
            echo
            echo "_Expires on **$(date --utc --date=+90days +%F)** (UTC)._"
            echo
          } >> "$GITHUB_STEP_SUMMARY"
          shopt -u nullglob
