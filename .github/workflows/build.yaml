name: Build

on:
  push:
  pull_request:

# Group workflow runs by event and ref.
# New runs cancel any pending run.
# PR runs also cancel in-progress runs.
concurrency:
  group: build-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  prepare:
    name: Setup
    runs-on: ubuntu-slim
    timeout-minutes: 5
    permissions:
      # 'read' avoids accidental access to draft releases.
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      do_release: ${{ steps.check_release.outputs.do_release }}
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - name: Checkout required files
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            ci
            metadata.toml
            stonecutter.settings.toml
            pyproject.toml
            uv.lock
          sparse-checkout-cone-mode: false

      - uses: actions/setup-python@v6
        with:
          python-version-file: pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install CI dependencies
        run: uv sync --locked --no-group dev

      - name: Read project version
        id: version
        run: |
          version=$(yq .mod.version metadata.toml)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check if a release should be made
        id: check_release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/github-script@v8
        env:
          VERSION: ${{ steps.version.outputs.version }}
        with:
          script: |
            const tag = `v${process.env.VERSION}`
            try {
              const { data } = await github.rest.repos.getReleaseByTag({ ...context.repo, tag })
              core.notice(`${tag} already published (${data.published_at})`)
            } catch (err) {
              if (err.status !== 404) throw err
              core.notice(`${tag} not published — creating release`)
              core.setOutput("do_release", "true")
            }

      - name: Generate build matrix
        id: matrix
        env:
          version: ${{ steps.version.outputs.version }}
        run: |
          uv run build-matrix --version "$version" --output matrix.json
          echo "matrix=$(cat matrix.json)" >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v6

      # Install Java used by the Gradle wrapper.
      # The JVM used to build is installed separately by the foojay resolver.
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v5

      - name: Run gradle
        env:
          args: ${{ toJSON(matrix.gradle_args) }}
        run: |
          # Build each task
          mapfile -t args < <( echo "$args" | jq --raw-output .[] )
          ./gradlew "${args[@]}"

      - name: Upload build
        if: matrix.upload_name && matrix.upload_path
        id: upload
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.upload_name }}
          path: ${{ matrix.upload_path }}
          retention-days: ${{ matrix.upload_days || '90' }}
          if-no-files-found: error

      - name: Upload summary
        if: ${{ steps.upload.outputs.artifact-url }}
        shell: bash
        env:
          upload_name: ${{ matrix.upload_name }}
          upload_path: ${{ matrix.upload_path }}
          upload_days: ${{ matrix.upload_days || '90' }}
          upload_url: ${{ steps.upload.outputs.artifact-url }}
        run: |
          {
            echo "## Build artifacts"
            echo
            echo "**Files:**"
            echo
            (
              shopt -s nullglob
              IFS=$'\n'
              for file in $upload_path; do
                echo "- \`$(basename "$file")\`"
              done
            )
            echo
            echo "**Download:** [$upload_name.zip]($upload_url)"
            echo
            echo "_Expires on **$(date --utc --date=+"$upload_days"days +%F)** (UTC)._"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

  publish:
    if: needs.prepare.outputs.do_release || github.event.pull_request
    name: Publish ${{ github.event.pull_request && '(dry run)' || '' }}
    needs:
      - prepare
      - build
    runs-on: ubuntu-slim
    timeout-minutes: 30
    permissions:
      # Grant 'write' to create releases.
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin

      - name: Install release publisher
        env:
          version: ${{ needs.prepare.outputs.version }}
        run: |
          tar --extract --file="artifacts/publish-$version.tar"
          echo "$PWD/publish-$version/bin" >> "$GITHUB_PATH"

      - name: Publish release
        env:
          do_release: ${{ needs.prepare.outputs.do_release }}
          GITHUB_TOKEN: ${{ needs.prepare.outputs.do_release && github.token || 'dummy-token' }}
        run: |
          args=( artifacts )
          [ -n "$do_release" ] || {
            echo "::notice::Doing a dry run release"
            args+=( --dry-run )
          }
          publish "${args[@]}"
