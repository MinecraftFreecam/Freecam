name: Build

on:
  push:
  pull_request:

# Only allow running one build per branch at a time to optimise cache hits
concurrency:
  group: builds-${{ github.ref }}

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  prepare:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - name: Checkout required files
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            ci
            metadata.toml
            stonecutter.json5
            pyproject.toml
            uv.lock
          sparse-checkout-cone-mode: false

      - uses: actions/setup-python@v6
        with:
          python-version-file: pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install CI dependencies
        run: uv sync --locked --no-group dev

      - name: Read project version
        id: version
        run: |
          version=$(yq .mod.version metadata.toml)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Generate build matrix
        id: matrix
        env:
          version: ${{ steps.version.outputs.version }}
        run: |
          uv run build-matrix --version "$version" --output matrix.json
          echo "matrix=$(cat matrix.json)" >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v6

      # Install Java used by the Gradle wrapper.
      # The JVM used to build is installed separately by the foojay resolver.
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
      - uses: gradle/actions/setup-gradle@v5
        with:
          # TODO: Revert to default (`!= main`) when merging `stonecutter` branch
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/stonecutter' }}

      - name: Run gradle
        env:
          args: ${{ toJSON(matrix.gradle_args) }}
        run: |
          # Build each task
          mapfile -t args < <( echo "$args" | jq --raw-output .[] )
          ./gradlew "${args[@]}"

      - name: Upload build
        if: matrix.upload_name && matrix.upload_path
        id: upload
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.upload_name }}
          path: ${{ matrix.upload_path }}
          retention-days: 90
          if-no-files-found: error

      - name: Upload summary
        if: ${{ steps.upload.outputs.artifact-url }}
        shell: bash
        env:
          upload_name: ${{ matrix.upload_name }}
          upload_path: ${{ matrix.upload_path }}
          upload_url: ${{ steps.upload.outputs.artifact-url }}
        run: |
          {
            echo "## Build artifacts"
            echo
            echo "**Files:**"
            echo
            (
              shopt -s nullglob
              IFS=$'\n'
              for file in $upload_path; do
                echo "- \`$(basename "$file")\`"
              done
            )
            echo
            echo "**Download:** [$upload_name.zip]($upload_url)"
            echo
            echo "_Expires on **$(date --utc --date=+90days +%F)** (UTC)._"
            echo
          } >> "$GITHUB_STEP_SUMMARY"
