name: Crowdin

on:
  # Merge pushed changes with Crowdin project state
  push:
    branches: [main]
    paths:
      - 'i18n/src/main/*/*.toml'

  # Dispatch events are triggered via UI, CLI, or webhook
  workflow_dispatch:
    inputs:
      upload_sources:
        description: Whether to upload the en_US source files
        type: boolean
        default: true
        required: true
      upload_translations:
        description: Whether to upload the translated files
        type: boolean
        default: false
        required: true
      download_translations:
        description: Whether to download the translated files into a PR
        type: boolean
        default: false
        required: true
      last_activity:
        description: Timestamp for the latest activity on the Crowdin project
        type: string
        required: false
      last_updated:
        description: Timestamp for the last update to the Crowdin project
        type: string
        required: false

# Group workflow runs by event and ref.
# New runs cancel any pending run.
# In-progress runs are allowed to complete.
concurrency:
  group: crowdin-${{ github.event_name }}-${{ github.ref }}

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  upload:
    name: Upload
    runs-on: ubuntu-slim
    timeout-minutes: 10
    if: github.event_name == 'push' || inputs.upload_sources || inputs.upload_translations

    permissions:
      contents: read

    steps:
      - name: Install Crowdin CLI
        # Currently only used on push
        if: github.event_name == 'push'
        run: npm install -g @crowdin/cli

      - uses: actions/checkout@v6

      - name: Restore Crowdin cache
        uses: actions/cache/restore@v5
        with:
          path: .crowdin
          key: crowdin-${{ hashFiles('i18n/src/main/en_US/*.toml') }}
          restore-keys: crowdin-

      - name: Merge Crowdin state
        if: github.event_name == 'push'
        env:
          before: ${{ github.event.before }}
          i18n_branch: i18n/${{ github.ref_name }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
        run: |
          # Find the merge base with the i18n PR branch
          # Fallback to using the event's 'before' commit
          if git ls-remote --exit-code origin "$i18n_branch" &>/dev/null; then
            git fetch origin "$i18n_branch"
            base=$(git merge-base HEAD "origin/$i18n_branch")
          else
            echo "i18n branch not found, falling back to github.event.before"
            base="$before"
          fi
          # Ensure the base commit is reachable
          git fetch origin "$base"

          git branch actual HEAD
          git switch -c tmp "$base"

          # Pull Crowdin state
          crowdin download --no-progress --config crowdin.yaml
          git commit --all --allow-empty -m "crowdin snapshot"

          # Merge pushed changes
          if ! git merge --no-edit --no-ff actual; then
            echo "::error::Merge conflict between Crowdin and pushed changes"
            exit 1
          fi

      - name: Crowdin push
        uses: crowdin/github-action@v2
        with:
          config: crowdin.yaml
          upload_sources: ${{ github.event_name == 'push' || inputs.upload_sources }}
          upload_sources_args: --cache
          upload_translations: ${{ inputs.upload_translations }}
          download_translations: false
          project_id: ${{ secrets.CROWDIN_PROJECT_ID }}
          token: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}

      - name: Save Crowdin cache
        uses: actions/cache/save@v5
        if: always()
        with:
          path: .crowdin
          key: crowdin-${{ hashFiles('i18n/src/main/en_US/*.toml') }}

  download:
    name: Download
    runs-on: ubuntu-slim
    timeout-minutes: 10
    if: inputs.download_translations

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate summary
        id: summary
        env:
          last_updated: ${{ inputs.last_updated }}
          last_activity: ${{ inputs.last_activity }}
          project_url: https://crowdin.com/project/freecam
        run: |
          echo "{}" > summary.json

          {
            echo "New pull request with translations from [Crowdin]($project_url)."
            echo
          } >> summary.md

          {
            echo "New pull request with translations from Crowdin."
            echo
            echo "$project_url" 
            echo
          } >> summary.txt

          if [ -n "$last_updated" ]; then
            echo "- Last updated $last_updated" >> summary.md
            echo "Last updated $last_updated" >> summary.txt
            tmp=$(mktemp)
            jq --compact-output \
              --arg last_updated "$last_updated" \
              '.last_updated = $last_updated' \
              summary.json \
              > "$tmp" && mv "$tmp" summary.json
          fi

          if [ -n "$last_activity" ]; then
            echo "- Last activity $last_activity" >> summary.md
            echo "Last activity $last_activity" >> summary.txt
            tmp=$(mktemp)
            jq --compact-output \
              --arg last_activity "$last_activity" \
              '.last_activity = $last_activity' \
              summary.json \
              > "$tmp" && mv "$tmp" summary.json
          fi

          for fmt in json text md; do
            {
              echo "$fmt<<EOF"
              cat "summary.$fmt"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          done

      - name: Crowdin pull
        uses: crowdin/github-action@v2
        with:
          config: crowdin.yaml
          upload_sources: false
          upload_translations: false
          download_translations: true
          skip_untranslated_strings: true
          skip_untranslated_files: true
          create_pull_request: true
          pull_request_title: |
            i18n: new translations from Crowdin
          pull_request_body: |
            <!-- metadata:
              ${{ steps.summary.outputs.json }}
            -->

            ${{ steps.summary.outputs.md }}

            Powered by [Crowdin's GitHub Action](https://github.com/crowdin/github-action).
          pull_request_labels: enhancement, i18n
          pull_request_base_branch_name: ${{ github.ref_name }}
          localization_branch_name: i18n/${{ github.ref_name }}
          commit_message: |
            chore(i18n): new translations from Crowdin

            ${{ steps.summary.outputs.text }}
          project_id: ${{ secrets.CROWDIN_PROJECT_ID }}
          token: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
