tooltip = "Сквозь какие блоки вы можете проходить в режиме свободной камеры."

ignoreAll.label = "Игнорировать всю коллизию"
ignoreAll."tooltip[0]" = "Позволяет перемещаться сквозь все блоки в режиме свободной камеры."
ignoreAll."tooltip[1]" = "§eПереопределяет вышеуказанные настройки."

ignoreTransparent.label = "Игнорировать прозрачные блоки"
ignoreTransparent.tooltip = "Позволяет перемещаться сквозь прозрачные блоки в свободной камере."

ignoreOpenable.label = "Игнорировать открываемые блоки"
ignoreOpenable.tooltip = "Позволяет перемещаться через двери/люки/калитки в режиме свободной камеры."

ignoreCustom.label = "Пользовательский список исключений"
ignoreCustom.tooltip = "Позволяет перемещаться сквозь некоторые блоки в режиме свободной камеры."

whitelist.ids.label = "Игнорировать идентификаторы"
