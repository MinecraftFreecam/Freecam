[freecam.config.gui]
title = "Настройки Freecam"

[freecam.config.controls]
label = "Настройка клавиш"
tooltip = "Настройка клавиши для Freecam."

[freecam.config.movement]
label = "Настройки движения"
tooltip = "Как двигается камера."

flightMode.label = "Режим полёта"
