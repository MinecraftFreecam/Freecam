[freecam.config.gui]
title = "Definições do Freecam"

  [freecam.config.gui.fallback]
  title = "A interface de definições está indisponível."

[freecam.config.controls]
label = "Atalhos"
tooltip = "Atalhos do Freecam"

[freecam.config.movement]
label = "Definições de Movimento"
tooltip = "Como a câmara desloca-se."

  [freecam.config.movement.flightMode]
  label = "Modo de Voo"
  tooltip = "O modo de voo utilizado pelo Freecam."
  DEFAULT = "Padrão"
  CREATIVE = "Criativo"

  [freecam.config.movement.speed]
  value = "Valor: %01.2f"

    [freecam.config.movement.speed.horizontal]
    label = "Velocidade Horizontal"
    tooltip = "A velocidade horizontal do freecam."

    [freecam.config.movement.speed.vertical]
    label = "Velocidade Vertical"
    tooltip = "A velocidade vertical da câmara."

[freecam.config.collision]
label = "Definições de Colisão"
tooltip = "Em quais blocos é possível atravessar no freecam"

  [freecam.config.collision.ignoreAll]
  label = "Ignorar todas as colisões"
  "tooltip[0]" = "Permite atravessar todos os blocos no freecam."
  "tooltip[1]" = "Sobrepõe todas as definições."

  [freecam.config.collision.ignoreTransparent]
  label = "Ignorar Blocos Invisíveis"
  tooltip = "Permite atravessar blocos invisíveis no freecam."

  [freecam.config.collision.ignoreOpenable]
  label = "Ignorar Blocos com Interação"
  tooltip = "Permite atravessar portas, alçapões e portões no freecam."

  [freecam.config.collision.ignoreCustom]
  label = "Lista Personalizada"
  tooltip = "Permite atravessar alguns blocos no freecam."

[freecam.config.collision.whitelist.ids]
label = "Ignorar Identificadores"
"tooltip[0]" = 'Usar Identificador, em exemplo, "grass_block".'
"tooltip[1]" = 'Se o espaço de nomes for omitido, "Minecraft: " será assumido.'

[freecam.config.collision.whitelist.patterns]
label = "Ignorar Expressões Regulares"
"tooltip[0]" = "Use a sintaxe de expressão regular."
"tooltip[1]" = 'Correspondência pelo ID completo do bloco, exemplo: "Minecraft:grass_block".'

  [freecam.config.collision.alwaysCheck]
  label = "Sempre Verificar a Colisão Inicial"
  "tooltip[0]" = "Se a §7Perspetiva inicial§r deve ser verificada"
  "tooltip[1]" = "colisão, mesmo se utilizar §7Ignorar as Colisões§r."

[freecam.config.visual]
label = "Ajustes Visuais"
tooltip = "O visual do Freecam."

  [freecam.config.visual.perspective]
  label = "Perspetiva Inicial"
  tooltip = "A perspetiva inicial da câmara."
  FIRST_PERSON = "Primeira Pessoa"
  THIRD_PERSON = "Terceira Pessoa"
  THIRD_PERSON_MIRROR = "Espelhar"
  INSIDE = "Dentro"

  [freecam.config.visual.showPlayer]
  label = "Mostrar Jogador"
  tooltip = "Mostra o Jogador na posição original."

  [freecam.config.visual.showHand]
  label = "Mostrar a Mão"
  tooltip = "Se pode ver a sua mão no Freecam."

  [freecam.config.visual.fullBright]
  label = "Brilho Total"
  tooltip = "Aumenta o brilho no Freecam."

  [freecam.config.visual.showSubmersionFog]
  label = "Mostrar Neblina ao Submergir-se"
  tooltip = "Se pode ver uma sobreposição de neblina debaixo d'água, d'lava e de neve em pó."

[freecam.config.utility]
label = "Utilidades"
tooltip = "Reajustes no Freecam."

  [freecam.config.utility.disableOnDamage]
  label = "Desativar ao receber Dano"
  tooltip = "Desabilita o freecam ao aleijar-se."

  [freecam.config.utility.freezePlayer]
  label = "Congelar Jogador"
  "tooltip[0]" = "Impede o Deslocamento do jogador se estiver no freecam."
  "tooltip[1]" = "§cALERTA: Uso em Multijogador não recomendado."

[freecam.config.utility.interact.allow]
label = "Permitir Interação"
"tooltip[0]" = "Se tu podes interagir com blocos/entidades no freecam."
"tooltip[1]" = "§cALERTA: Uso em Multijogador não recomendado."

[freecam.config.utility.interact.mode]
label = "Modo de Interação"
tooltip = "A fonte das interações com blocos/entidades."
CAMERA = "Câmara"
PLAYER = "Jogador"

[freecam.config.servers]
label = "Multijogador"
tooltip = "Definições relacionadas aos servidores multijogador."

  [freecam.config.servers.mode]
  label = "Modo restringido"
  "tooltip[0]" = "Permite ou proíbe a utilização do freecam em determinados servidores."
  "tooltip[1]" = "(ou a utilizar uma lista branca, ou uma lista negra)."
  NONE = "Sem restrição"
  WHITELIST = "Lista branca"
  BLACKLIST = "Lista negra"

  [freecam.config.servers.whitelist]
  label = "Lista branca:"

  [freecam.config.servers.blacklist]
  label = "Lista negra:"

[freecam.config.notification]
label = "Notificações"
tooltip = "Exibe ou oculta as notificações."

  [freecam.config.notification.freecam]
  label = "Notificações do Freecam"
  tooltip = "Notifies you when entering/exiting freecam."

  [freecam.config.notification.tripod]
  label = "Tripod Notifications"
  tooltip = "Notifies you when entering/exiting tripod cameras."
