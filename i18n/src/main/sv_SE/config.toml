[freecam.config.gui]
title = "Freecam-inställningar"

  [freecam.config.gui.fallback]
  title = "KonfigurationsGUI är inte tillgängligt."

[freecam.config.controls]
label = "Nyckelbindningar"
tooltip = "Freecam-nyckelbindningar."

[freecam.config.movement]
label = "Rörelsealternativ"
tooltip = "Hur kameran rör sig."

  [freecam.config.movement.flightMode]
  label = "Flygläge"
  tooltip = "Den typ av flygning som används av freecam."
  DEFAULT = "Standard"
  CREATIVE = "Kreativt"

  [freecam.config.movement.speed]
  value = "Värde: %01.2f"

    [freecam.config.movement.speed.horizontal]
    label = "Horisontell hastighet"
    tooltip = "Den horisontella hastigheten av freecam."

    [freecam.config.movement.speed.vertical]
    label = "Vertikal hastighet"
    tooltip = "Den vertikala hastigheten av freecam."

[freecam.config.collision]
label = "Kollisionsalternativ"
tooltip = "Vilka block du kan resa igenom i freecam."

  [freecam.config.collision.ignoreAll]
  label = "Ignorera alla kollisioner"
  "tooltip[0]" = "Tillåter att resa genom alla block i freecam."
  "tooltip[1]" = "§eÅsidosätter ovanstående inställningar."

  [freecam.config.collision.ignoreTransparent]
  label = "Ignorera genomskinliga block"
  tooltip = "Tillåter att resa genom genomskinliga block i freecam."

  [freecam.config.collision.ignoreOpenable]
  label = "Ignorera öppningsbara block"
  tooltip = "Gör det möjligt att färdas genom dörrar/falluckor/portar i freecam."

  [freecam.config.collision.ignoreCustom]
  label = "Anpassad Ignorera Lista"
  tooltip = "Tillåter att resa genom specifika block i freecam."

[freecam.config.collision.whitelist.ids]
label = "Ignorera ID"
"tooltip[0]" = 'Använd block-id, t.ex. "grass_block".'
"tooltip[1]" = 'Om namnrymden utelämnas antas "minecraft:".'

[freecam.config.collision.whitelist.patterns]
label = "Ignorera vanliga uttryck"
"tooltip[0]" = "Använd syntaxen för reguljära uttryck."
"tooltip[1]" = 'Matchade mot hela block-id, t.ex. "minecraft:grass_block".'

  [freecam.config.collision.alwaysCheck]
  label = "Kontrollera alltid den initiala kollisionen"
  "tooltip[0]" = "Huruvida initiala perspektiv§r ska kolla efter"
  "tooltip[1]" = "kollision, även när du använder §7Ignorera All Collision§r."

[freecam.config.visual]
label = "Visuella Alternativ"
tooltip = "Utseendet på freecam."

  [freecam.config.visual.perspective]
  label = "Initialt perspektiv"
  tooltip = "Kamerans initiala perspektiv."
  FIRST_PERSON = "Första person"
  THIRD_PERSON = "Tredje person"
  THIRD_PERSON_MIRROR = "Spegel"
  INSIDE = "Insidan"

  [freecam.config.visual.showPlayer]
  label = "Visa spelare"
  tooltip = "Visar din spelare i sin ursprungliga position."

  [freecam.config.visual.showHand]
  label = "Visa hand"
  tooltip = "Om du kan se din hand i freecam."

  [freecam.config.visual.fullBright]
  label = "Full Ljusstyrka"
  tooltip = "Ökar ljusstyrkan i freecam."

  [freecam.config.visual.showSubmersionFog]
  label = "Visa nedsänkt Dimma"
  tooltip = "Oavsett om du ser en dimma ligga under vattnet, i lava eller pulveriserad snö."

  [freecam.config.visual.outlinePlayer]
  label = "Konturera spelare"
  "tooltip[0]" = "Applicera en kontur till din spelare när du aktiverar Freecam."
  "tooltip[1]" = 'Konturen kan också styras med knappsatsen "Toggle Player Outline".'

[freecam.config.utility]
label = "Alternativ för verktyg"
tooltip = "Freecam förbättringar."

  [freecam.config.utility.disableOnDamage]
  label = "Inaktivera vid skada"
  tooltip = "Inaktiverar freecam när skada tas emot."

  [freecam.config.utility.freezePlayer]
  label = "Frys spelaren"
  "tooltip[0]" = "Förhindrar spelarens rörelse medan freecam är aktiv."
  "tooltip[1]" = "§cVARNING: Flerspelaranvändning rekommenderas inte."

[freecam.config.utility.interact.allow]
label = "Tillåt interaktion"
"tooltip[0]" = "Om du kan interagera med block/enheter i freecam."
"tooltip[1]" = "§cVARNING: Flerspelaranvändning rekommenderas inte."

[freecam.config.utility.interact.mode]
label = "Interaktionsläge"
tooltip = "Källan till interaktioner mellan block/entitet."
CAMERA = "Kamera"
PLAYER = "Spelare"

[freecam.config.servers]
label = "Flerspelaralternativ"
tooltip = "Alternativ relaterade till flerspelarservrar."

  [freecam.config.servers.mode]
  label = "Begränsning läge"
  "tooltip[0]" = "Tillåt eller neka användning av freecam på vissa servrar."
  "tooltip[1]" = "(använder antingen en vitlista eller en svartlista)."
  NONE = "Ingen begränsning"
  WHITELIST = "Vitlista"
  BLACKLIST = "Svartlista"

  [freecam.config.servers.whitelist]
  label = "Vitlista:"

  [freecam.config.servers.blacklist]
  label = "Svartlista:"

[freecam.config.notification]
label = "Aviseringsalternativ"
tooltip = "Visa eller dölj aviseringar."

  [freecam.config.notification.freecam]
  label = "Freecam aviseringar"
  tooltip = "Meddelar dig när du går in/avslutar freecam."

  [freecam.config.notification.tripod]
  label = "Stativ Notifikationer"
  tooltip = "Notifierar dig när du anger/avslutar stativkameror."
