[freecam.config.gui]
title = "Opzioni Camera libera"

[freecam.config.controls]
label = "Associazione dei Tasti"
tooltip = "Associazione dei tasti della Camera libera."

[freecam.config.movement]
label = "Opzioni di Movimento"
tooltip = "Come si muove la telecamera."

flightMode.label = "Modalità di Volo"
flightMode.tooltip = "Il tipo di volo utilizzato dalla Camera libera."
flightMode.DEFAULT = "Predefinito"
flightMode.CREATIVE = "Creativa"

speed.horizontal.label = "Velocità orizzontale"
speed.horizontal.tooltip = "La velocità orizzontale della Camera libera."
speed.vertical.label = "Velocità Verticale"
speed.vertical.tooltip = "La velocità verticale della Camera libera."

[freecam.config.collision]
label = "Opzioni di Collisione"
tooltip = "Quali blocchi puoi attraversare nella Camera libera."

ignoreAll.label = "Ignora Tutte le Collisioni"
ignoreAll."tooltip[0]" = "Consente di viaggiare attraverso tutti i blocchi nella Camera libera."
ignoreAll."tooltip[1]" = "§eSostituisce le impostazioni precedenti."

ignoreTransparent.label = "Ignora Blocchi Trasparenti"
ignoreTransparent.tooltip = "Consente di viaggiare attraverso blocchi trasparenti nella Camera libera."

ignoreOpenable.label = "Ignora i Blocchi Apribili"
ignoreOpenable.tooltip = "Consente di attraversare porte/botole/cancelli nella Camera libera."

ignoreCustom.label = "Elenco Personalizzato Ignorato"
ignoreCustom.tooltip = "Consente di viaggiare attraverso blocchi specifici della Camera libera."

whitelist.ids.label = "Ignora ID"
whitelist.ids."tooltip[0]" = "Usa blocco id, es. \"grass_block\"."
whitelist.ids."tooltip[1]" = "Se lo spazio dei nomi viene omesso, si presume che venga usato \"minecraft:\"."
whitelist.patterns.label = "Ignora le Espressioni Regolari"
whitelist.patterns."tooltip[0]" = "Usa le sintassi Espressioni Regolari."
whitelist.patterns."tooltip[1]" = "Corrisponde all'ID completo del blocco, ad esempio \"minecraft:grass_block\"."

alwaysCheck.label = "Controlla Sempre la Collisione Iniziale"
alwaysCheck."tooltip[0]" = "Se la §7Prospettiva Iniziale§r deve controllare la"
alwaysCheck."tooltip[1]" = "collisione, anche quando si utilizza §7Ignora Tutte le Collisioni§r."

[freecam.config.visual]
label = "Opzioni Visive"
tooltip = "Lo sguardo della Camera libera."

perspective.label = "Prospettiva Iniziale"
perspective.tooltip = "La prospettiva iniziale della Camera libera."
perspective.FIRST_PERSON = "La Prima Persona"
perspective.THIRD_PERSON = "Terza Persona"
perspective.THIRD_PERSON_MIRROR = "Rispecchiato"
perspective.INSIDE = "Dentro"

