[freecam.config.controls]
label = "按键绑定"
tooltip = "Freecam 按键绑定。"

[freecam.config.movement]
label = "移动选项"
tooltip = "视角如何移动。"

  [freecam.config.movement.flightMode]
  label = "飞行模式"
  tooltip = "Freecam 角使用的飞行方式。"
  DEFAULT = "默认"
  CREATIVE = "创造"

  [freecam.config.movement.speed]
  value = "Value: %01.2f"

    [freecam.config.movement.speed.horizontal]
    label = "水平速度"
    tooltip = "Freecam 角的水平速度。"

    [freecam.config.movement.speed.vertical]
    label = "垂直速度"
    tooltip = "自由视角的垂直速度。"

[freecam.config.collision]
label = "碰撞选项"
tooltip = "你可以在自由视角中穿过哪些方块。"

  [freecam.config.collision.ignoreAll]
  label = "忽略所有碰撞"
  "tooltip[0]" = "允许在自由视角中穿过所有方块。"
  "tooltip[1]" = "§e覆盖以上设置。"

  [freecam.config.collision.ignoreTransparent]
  label = "忽略透明方块"
  tooltip = "允许在自由视角中穿过透明的方块。"

  [freecam.config.collision.ignoreOpenable]
  label = "忽略可打开方块"
  tooltip = "允许在自由视角中穿过门/活板门/栅栏门。"

  [freecam.config.collision.ignoreCustom]
  label = "自定义忽略清单"
  tooltip = "允许在自由视角中穿过所有方块。"

[freecam.config.collision.whitelist.ids]
label = "忽略 ID"
"tooltip[0]" = '使用方块ID，例如 "grass_block"。'
"tooltip[1]" = "如果省略命名空间，则假定其未“minecraft:”。"

[freecam.config.collision.whitelist.patterns]
label = "忽略正则表达式"
"tooltip[0]" = "使用正则表达式。"
"tooltip[1]" = '匹配到完整方块ID，例如"minecraft:grass_block"。'

  [freecam.config.collision.alwaysCheck]
  label = "始终检查初始碰撞"
  "tooltip[0]" = "§7初始视角§r是否应该检查"
  "tooltip[1]" = "碰撞，即使使用了§7忽略所有碰撞§r。"

[freecam.config.visual]
label = "视觉选项"
tooltip = "自由视角的样子。"

  [freecam.config.visual.perspective]
  label = "初始视角"
  tooltip = "自由视角的初始视角。"
  FIRST_PERSON = "第一人称"
  THIRD_PERSON = "第三人称"
  THIRD_PERSON_MIRROR = "镜像"
  INSIDE = "内部"

  [freecam.config.visual.showPlayer]
  label = "显示玩家"
  tooltip = "在原来的位置上显示你的玩家。"

  [freecam.config.visual.showHand]
  label = "显示手"
  tooltip = "当你处于自由视角是否可以看到你的手。"

  [freecam.config.visual.fullBright]
  label = "高亮夜视"
  tooltip = "在自由视角中增加亮度。"

  [freecam.config.visual.showSubmersionFog]
  label = "显示淹没雾"
  tooltip = "您是否看到雾覆盖在水下、熔岩和粉状雪中。"

[freecam.config.utility]
label = "实用工具选项"
tooltip = "自由视角增强功能。"

  [freecam.config.utility.disableOnDamage]
  label = "受伤时禁用"
  tooltip = "受到伤害时禁用自由视角。"

  [freecam.config.utility.freezePlayer]
  label = "冻结玩家"
  "tooltip[0]" = "启用自由视角时防止玩家移动。"
  "tooltip[1]" = "§c警告：不建议多人游戏使用。"

[freecam.config.utility.interact.allow]
label = "允许交互"
