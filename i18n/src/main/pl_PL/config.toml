[freecam.config.gui]
title = "Opcje Freecam"

  [freecam.config.gui.fallback]
  title = "Config GUI not available."

[freecam.config.controls]
label = "Przypisania Klawiszy"
tooltip = "Przypisania klawiszy Freecam."

[freecam.config.movement]
label = "Opcje Ruchu"
tooltip = "Jak porusza się kamera."

  [freecam.config.movement.flightMode]
  label = "Tryb lotu"
  tooltip = "Typ lotu w freecam."
  DEFAULT = "Domyślny"
  CREATIVE = "Kreatywny"

  [freecam.config.movement.speed]
  value = "Value: %01.2f"

    [freecam.config.movement.speed.horizontal]
    label = "Prędkość pozioma"
    tooltip = "Prędkość pozioma wolnej kamery."

    [freecam.config.movement.speed.vertical]
    label = "Prędkość pionowa"
    tooltip = "Pionowa prędkość wolnej kamery."

[freecam.config.collision]
label = "Opcje kolizji"
tooltip = "Przez które bloki możesz przechodzić w wolnej kamerze."

  [freecam.config.collision.ignoreAll]
  label = "Ignoruj wszystkie kolizje"
  "tooltip[0]" = "Umożliwia podróżowanie przez wszystkie bloki w wolnej kamerze."
  "tooltip[1]" = "§eNadpisuje powyższe ustawienia."

  [freecam.config.collision.ignoreTransparent]
  label = "Ignoruj Przezroczyste Bloki"
  tooltip = "Umożliwia podróżowanie przez przezroczyste bloki w wolnej kamerze."

  [freecam.config.collision.ignoreOpenable]
  label = "Ignoruj Otwierane Bloki"
  tooltip = "Umożliwia przemieszczanie się przez drzwi/klapki/furtki w trybie freecam."

  [freecam.config.collision.ignoreCustom]
  label = "Niestandardowa Lista Ignorowania"
  tooltip = "Umożliwia przemieszczanie się przez określone bloki w trybie freecam."

[freecam.config.collision.whitelist.ids]
label = "Ignoruj identyfikatory"
"tooltip[0]" = 'Użyj identyfikatora bloku, np. "grass_block".'
"tooltip[1]" = 'Jeżeli nie została podana przestrzeń nazw, domyślnie: "minecraft:".'

[freecam.config.collision.whitelist.patterns]
label = "Ignoruj wyrażenia regularne (RegEx)"
"tooltip[0]" = "Użyj składni wyrażeń regularnych (RegEx)."
"tooltip[1]" = 'Porównywane z pełnym identyfikatorem bloku, np. "minecraft:grass_block".'

  [freecam.config.collision.alwaysCheck]
  label = "Zawsze Sprawdzaj Początkową Kolizję"
  "tooltip[0]" = "Czy §7perspektywa początkowa§r powinna być sprawdzana"
  "tooltip[1]" = "kolizja, nawet podczas używania §7Ignoruj wszystkie kolizje§r."

[freecam.config.visual]
label = "Opcje wizualne"
tooltip = "Wygląd wolnej kamery."

  [freecam.config.visual.perspective]
  label = "Perspektywa początkowa"
  tooltip = "Początkowa perspektywa kamery."
  FIRST_PERSON = "Pierwszoosobowy"
  THIRD_PERSON = "Trzecioosobowy"
  THIRD_PERSON_MIRROR = "Lustrzane odbicie"
  INSIDE = "Wewnątrz"

  [freecam.config.visual.showPlayer]
  label = "Pokaż Gracza"
  tooltip = "Pokazuje gracza w jego oryginalnej pozycji."

  [freecam.config.visual.showHand]
  label = "Pokaż rękę"
  tooltip = "Czy widzisz swoją rękę w wolnej kamerze."

  [freecam.config.visual.fullBright]
  label = "Pełna jasność"
  tooltip = "Zwiększa jasność w freecam."

  [freecam.config.visual.showSubmersionFog]
  label = "Pokaż mgłę przy zanurzeniu"
  tooltip = "Czy widzisz nakładkę mgły pod wodą, w lawie czy na śniegu."

[freecam.config.utility]
label = "Opcje użytkowe"
tooltip = "Rozszerzenia wolnej kamery."

  [freecam.config.utility.disableOnDamage]
  label = "Wyłącz podczas obrażeń"
  tooltip = "Wyłącza wolną kamerę po otrzymaniu obrażeń."

  [freecam.config.utility.freezePlayer]
  label = "Zamroź Gracza"
  "tooltip[0]" = "Zapobiega poruszaniu się gracza, gdy wolna kamera jest aktywna."
  "tooltip[1]" = "§cOSTRZEŻENIE: Użycie w trybie dla wielu graczy nie jest zalecane."

[freecam.config.utility.interact.allow]
label = "Zezwalaj na interakcję"
"tooltip[0]" = "Czy możesz wchodzić w interakcje z blokami/bytami w trybie wolnej kamery."
"tooltip[1]" = "§cOSTRZEŻENIE: Użycie w trybie dla wielu graczy nie jest zalecane."

[freecam.config.utility.interact.mode]
label = "Tryb interaktywny"
tooltip = "Źródło interakcji blok/istota."
CAMERA = "Kamera"
PLAYER = "Gracz"

