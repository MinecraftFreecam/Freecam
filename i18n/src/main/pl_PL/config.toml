  "tooltip[1]" = "(używając białej lub czarnej listy)."
  NONE = "Bez ograniczeń"
  WHITELIST = "Biała lista"
  BLACKLIST = "Czarna lista"

  [freecam.config.servers.whitelist]
  label = "Biała lista:"

  [freecam.config.servers.blacklist]
  label = "Czarna lista:"

[freecam.config.notification]
label = "Opcje powiadomień"
tooltip = "Pokaż/Ukryj powiadomienia."

  [freecam.config.notification.freecam]
  label = "Powiadomienia wolnej kamery"
  tooltip = "Powiadamia o wejściu/wyjściu z wolnej kamery."

  [freecam.config.notification.tripod]
  label = "Powiadomienia ze statywu"
  tooltip = "Powiadamia o wejściu/wyjściu ze statywu."
