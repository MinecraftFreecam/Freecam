[freecam.config.gui]
title = "Freecam Options"
fallback.title = "Config GUI not available."

[freecam.config.controls]
label = "Key Bindings"
tooltip = "Freecam key bindings."

[freecam.config.movement]
label = "Movement Options"
tooltip = "How the camera moves."

flightMode.label = "Flight Mode"
flightMode.tooltip = "The type of flight used by freecam."
flightMode.DEFAULT = "Default"
flightMode.CREATIVE = "Creative"

speed.value = "Value: %01.2f"
speed.horizontal.label = "Horizontal Speed"
speed.horizontal.tooltip = "The horizontal speed of freecam."
speed.vertical.label = "Vertical Speed"
speed.vertical.tooltip = "The vertical speed of freecam."

[freecam.config.collision]
label = "Collision Options"
tooltip = "Which blocks you can travel through in freecam."

ignoreAll.label = "Ignore All Collision"
ignoreAll."tooltip[0]" = "Allows travelling through all blocks in freecam."
ignoreAll."tooltip[1]" = "§eOverrides above settings."

ignoreTransparent.label = "Ignore Transparent Blocks"
ignoreTransparent.tooltip = "Allows travelling through transparent blocks in freecam."

ignoreOpenable.label = "Ignore Openable Blocks"
ignoreOpenable.tooltip = "Allows travelling through doors/trapdoors/gates in freecam."

ignoreCustom.label = "Custom Ignore List"
ignoreCustom.tooltip = "Allows travelling through specific blocks in freecam."

whitelist.ids.label = "Ignore IDs"
whitelist.ids."tooltip[0]" = "Use block id, e.g. \"grass_block\"."
whitelist.ids."tooltip[1]" = "If the namespace is omitted, \"minecraft:\" is assumed."
whitelist.patterns.label = "Ignore Regular Expressions"
whitelist.patterns."tooltip[0]" = "Use Regular Expression syntax."
whitelist.patterns."tooltip[1]" = "Matched against full block id, e.g. \"minecraft:grass_block\"."

alwaysCheck.label = "Always Check Initial Collision"
alwaysCheck."tooltip[0]" = "Whether §7Initial Perspective§r should check for"
alwaysCheck."tooltip[1]" = "collision, even when using §7Ignore All Collision§r."

[freecam.config.visual]
label = "Visual Options"
tooltip = "The look of freecam."

perspective.label = "Initial Perspective"
perspective.tooltip = "The initial perspective of the camera."
perspective.FIRST_PERSON = "First Person"
perspective.THIRD_PERSON = "Third Person"
perspective.THIRD_PERSON_MIRROR = "Mirror"
perspective.INSIDE = "Inside"

showPlayer.label = "Show Player"
showPlayer.tooltip = "Shows your player in its original position."

showHand.label = "Show Hand"
showHand.tooltip = "Whether you can see your hand in freecam."

fullBright.label = "Full Brightness"
fullBright.tooltip = "Increases brightness while in freecam."

showSubmersionFog.label = "Show Submersion Fog"
showSubmersionFog.tooltip = "Whether you see a fog overlay underwater, in lava, or powdered snow."

[freecam.config.utility]
label = "Utility Options"
tooltip = "Freecam enhancements."

disableOnDamage.label = "Disable on Damage"
disableOnDamage.tooltip = "Disables freecam when damage is received."

freezePlayer.label = "Freeze Player"
freezePlayer."tooltip[0]" = "Prevents player movement while freecam is active."
freezePlayer."tooltip[1]" = "§cWARNING: Multiplayer usage not advised."

interact.allow.label = "Allow Interaction"
interact.allow."tooltip[0]" = "Whether you can interact with blocks/entities in freecam."
interact.allow."tooltip[1]" = "§cWARNING: Multiplayer usage not advised."
interact.mode.label = "Interaction Mode"
interact.mode.tooltip = "The source of block/entity interactions."
interact.mode.CAMERA = "Camera"
interact.mode.PLAYER = "Player"

[freecam.config.servers]
label = "Multiplayer Options"
tooltip = "Options relating to multiplayer servers."

mode.label = "Restriction mode"
mode."tooltip[0]" = "Allow or disallow use of freecam on certain servers."
mode."tooltip[1]" = "(using either a whitelist or blacklist)."
mode.NONE = "No restriction"
mode.WHITELIST = "Whitelist"
mode.BLACKLIST = "Blacklist"

whitelist.label = "Whitelist:"

blacklist.label = "Blacklist:"

[freecam.config.notification]
label = "Notification Options"
tooltip = "Show or hide notifications."

freecam.label = "Freecam Notifications"
freecam.tooltip = "Notifies you when entering/exiting freecam."

tripod.label = "Tripod Notifications"
tripod.tooltip = "Notifies you when entering/exiting tripod cameras."
