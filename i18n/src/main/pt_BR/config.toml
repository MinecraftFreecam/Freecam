[freecam.config.gui]
title = "Ajustes do Freecam"

  [freecam.config.gui.fallback]
  title = "Config GUI not available."

[freecam.config.controls]
label = "Atalhos"
tooltip = "Atalhos do Freecam"

[freecam.config.movement]
label = "Opções de movimento"
tooltip = "Como a câmera se movimenta."

  [freecam.config.movement.flightMode]
  label = "Modo de Voo"
  tooltip = "O tipo de voo usado pela câmera livre."
  DEFAULT = "Padrão"
  CREATIVE = "Criativo"

  [freecam.config.movement.speed]
  value = "Value: %01.2f"

    [freecam.config.movement.speed.horizontal]
    label = "Velocidade horizontal"
    tooltip = "A velocidade horizontal do freecam."

    [freecam.config.movement.speed.vertical]
    label = "Velocidade vertical"
    tooltip = "A velocidade vertical da câmera."

[freecam.config.collision]
label = "Opções de colisão"
tooltip = "Em quais blocos é possível atravessar no freecam"

  [freecam.config.collision.ignoreAll]
  label = "Ignorar colisões"
  "tooltip[0]" = "Permitir atravessar tudo no freecam."
  "tooltip[1]" = "§eSubstitui opções superiores."

  [freecam.config.collision.ignoreTransparent]
  label = "Ignorar blocos ausentes"
  tooltip = "Permite atravessar blocos ausentes no freecam."

  [freecam.config.collision.ignoreOpenable]
  label = "Ignorar blocos abríveis"
  tooltip = "Permite atravessar portas, alçapões e portões no freecam"

  [freecam.config.collision.ignoreCustom]
  label = "Lista personalizada"
  tooltip = "Permite atravessar certos blocos no freecam."

[freecam.config.collision.whitelist.ids]
label = "Ignorar IDs"
"tooltip[0]" = 'Use o id, do bloco. (ex: "grass_block").'
"tooltip[1]" = 'Se o espaço for omisso, utiliza-se "minecraft:".'

[freecam.config.collision.whitelist.patterns]
label = "Ignorar expressões regulares"
"tooltip[0]" = "Usa a sintaxe de expressões regulares"
"tooltip[1]" = 'Correspondido ao id completo do bloco. (ex: "minecraft:grass_block")'

  [freecam.config.collision.alwaysCheck]
  label = "Sempre conferir a colisão inicial"
  "tooltip[0]" = "Quando a §7Perspectiva inicial§r deve ser verificada"
  "tooltip[1]" = "colisão, mesmo se §7Ignorar colisões§r for usado."

[freecam.config.visual]
label = "Opções visuais"
tooltip = "O estilo do Freecam"

  [freecam.config.visual.perspective]
  label = "Perspectiva inicial"
  tooltip = "A perspectiva inicial da câmera."
  FIRST_PERSON = "Primeira pessoa"
  THIRD_PERSON = "Terceira pessoa"
  THIRD_PERSON_MIRROR = "Espelhar"
  INSIDE = "Dentro"

  [freecam.config.visual.showPlayer]
  label = "Exibir jogador"
  tooltip = "Exibe seu jogador na posição original."

  [freecam.config.visual.showHand]
  label = "Exibir mão"
  tooltip = "Se permite ver sua mão no freecam."

  [freecam.config.visual.fullBright]
  label = "Brilho total"
  tooltip = "Intensifica o brilho no freecam."

  [freecam.config.visual.showSubmersionFog]
  label = "Exibir névoa de fluidos"
  tooltip = "Se é visível uma névoa debaixo d'água, lava ou neve fofa."

[freecam.config.utility]
label = "Utilitários"
tooltip = "Ajustes no freecam"

  [freecam.config.utility.disableOnDamage]
  label = "Desativar ao levar dano"
  tooltip = "Sai do freecam ao receber dano."

  [freecam.config.utility.freezePlayer]
  label = "Parar jogador"
  "tooltip[0]" = "Impede de mover-se quando o freecam é ativado."
  "tooltip[1]" = "§cAVISO: O uso em multijogador não é recomendado."

[freecam.config.utility.interact.allow]
label = "Permitir interações"
"tooltip[0]" = "Se você pode interagir com blocos ou entidades no freecam."
"tooltip[1]" = "§cAVISO: O uso em multijogador não é recomendado."

[freecam.config.utility.interact.mode]
label = "Modo de interação"
tooltip = "A fonte das interações com blocos e entidades."
CAMERA = "Câmera"
PLAYER = "Jogador"

[freecam.config.servers]
label = "Ajustes de multijogador"
tooltip = "Ajustes relacionados aos servidores multijogadores."

  [freecam.config.servers.mode]
  label = "Modo restrito"
  "tooltip[0]" = "Alterna o uso de freecam em servidores."
  "tooltip[1]" = "(usando ou a lista branca, ou a lista negra)"
  NONE = "Sem restrições"
  WHITELIST = "Lista branca"
  BLACKLIST = "Lista negra"

  [freecam.config.servers.whitelist]
  label = "Lista branca:"

  [freecam.config.servers.blacklist]
  label = "Lista negra:"

[freecam.config.notification]
label = "Ajustes de notificação"
tooltip = "Exibe ou oculta as notificações."

  [freecam.config.notification.freecam]
  label = "Notificações do Freecam"
  tooltip = "Notifica-o ao entrar/sair do freecam."

  [freecam.config.notification.tripod]
  label = "Notificações do tripé"
  tooltip = "Notifica-o ao entrar ou sair de um tripé de câmeras."
