mode.WHITELIST = "Liste blanche"
mode.BLACKLIST = "Liste noire"

whitelist.label = "Liste blanche :"

blacklist.label = "Liste noire :"

[freecam.config.notification]
label = "Notifications"
tooltip = "Afficher ou cacher les notifications."

freecam.label = "Notifications de la caméra libre"
freecam.tooltip = "Vous avertit lorsque vous entrez ou sortez de la caméra libre."

tripod.label = "Notifications du tripode"
tripod.tooltip = "Vous avertit lorsque vous entrez ou sortez de caméras de tripode."
