[freecam.config.gui]
title = "Options pour la caméra libre"

  [freecam.config.gui.fallback]
  title = "Config GUI not available."

[freecam.config.controls]
label = "Raccourcis"
tooltip = "Raccourcis pour la caméra libre."

[freecam.config.movement]
label = "Mouvements"
tooltip = "Comment la caméra se déplace."

  [freecam.config.movement.flightMode]
  label = "Types de vol"
  tooltip = "La façon dont la caméra libre vole."
  DEFAULT = "Défaut"
  CREATIVE = "Créatif"

  [freecam.config.movement.speed]
  value = "Value: %01.2f"

    [freecam.config.movement.speed.horizontal]
    label = "Vitesse horizontale"
    tooltip = "La vitesse horizontale de la caméra libre."

    [freecam.config.movement.speed.vertical]
    label = "Vitesse verticale"
    tooltip = "La vitesse verticale de la caméra libre."

[freecam.config.collision]
label = "Collisions"
tooltip = "Les blocs que vous pouvez traverser en caméra libre."

  [freecam.config.collision.ignoreAll]
  label = "Ignorer toutes les collisions"
  "tooltip[0]" = "Permets de traverser tous les blocs en caméra libre."
  "tooltip[1]" = "§eRemplace les paramètres précédents."

  [freecam.config.collision.ignoreTransparent]
  label = "Ignorer les blocs transparents"
  tooltip = "Permets de traverser les blocs transparents avec la caméra libre."

  [freecam.config.collision.ignoreOpenable]
  label = "Ignorer les blocs ouvrables"
  tooltip = "Permets de traverser les portes/portillons/trappes en caméra libre."

  [freecam.config.collision.ignoreCustom]
  label = "Liste personnalisée"
  tooltip = "Permets de traverser certains blocs spécifiques en caméra libre."

[freecam.config.collision.whitelist.ids]
label = "Ignorer des IDs :"
"tooltip[0]" = "Utilisez l'id d'un bloc, comme \"grass_block\"."
"tooltip[1]" = 'Si le namespace est omis, "minecraft:" est utilisé.'

[freecam.config.collision.whitelist.patterns]
label = "Ignorer des expressions régulières :"
"tooltip[0]" = "Utilisez la syntaxe des expressions régulières."
"tooltip[1]" = "L'expression régulière se compare avec l'identifiant complet du bloc, par exemple \"minecraft:grass_block\"."

  [freecam.config.collision.alwaysCheck]
  label = "Toujours vérifier la collision initiale"
  "tooltip[0]" = "Si §7Perspective initiale§r doit vérifier les"
  "tooltip[1]" = "collisions, même en utilisant §7Ignorer toutes les collisions§r."

[freecam.config.visual]
label = "Visuels"
tooltip = "L'apparence de la caméra libre."

  [freecam.config.visual.perspective]
  label = "Perspective initiale"
  tooltip = "La perspective initiale de la caméra libre."
  FIRST_PERSON = "Première personne"
  THIRD_PERSON = "Troisième personne"
  THIRD_PERSON_MIRROR = "Miroir"
  INSIDE = "Intérieur"

  [freecam.config.visual.showPlayer]
  label = "Montrer le joueur"
  tooltip = "Montre votre personnage là où vous avez activé la caméra libre."

  [freecam.config.visual.showHand]
  label = "Afficher la main"
  tooltip = "Si vous pouvez voir votre main dans la caméra libre."

  [freecam.config.visual.fullBright]
  label = "Luminosité maximum"
  tooltip = "Augmente la luminosité en caméra libre."

  [freecam.config.visual.showSubmersionFog]
  label = "Afficher le brouillard de submersion"
  tooltip = "Si vous pouvez voir le brouillard sous la lave, l'eau, etc. en caméra libre."

[freecam.config.utility]
label = "Utilitaires"
tooltip = "Utilitaires pour la caméra libre."

  [freecam.config.utility.disableOnDamage]
  label = "Désactiver lorsque blessé"
  tooltip = "Désactive la caméra libre lorsque le joueur reçoit des dégâts."

  [freecam.config.utility.freezePlayer]
  label = "Geler le joueur"
  "tooltip[0]" = "Empêche les mouvements du joueur quand la caméra libre est activé."
  "tooltip[1]" = "§cAVERTISSEMENT : Déconseillé en multijoueur."

[freecam.config.utility.interact.allow]
label = "Autoriser les interactions"
"tooltip[0]" = "Si vous pouvez interagir avec les blocs/entités pendant la caméra libre."
"tooltip[1]" = "§cAVERTISSEMENT : Déconseillé en multijoueur."

[freecam.config.utility.interact.mode]
label = "Mode d'interaction"
tooltip = "La source de l'interaction avec les blocs/entités."
CAMERA = "Caméra"
PLAYER = "Joueur"

[freecam.config.servers]
label = "Multijoueurs"
tooltip = "Options en rapport avec les serveurs multijoueurs."

  [freecam.config.servers.mode]
  label = "Mode restreint"
  "tooltip[0]" = "Permets ou non d'utiliser la caméra libre sur certains serveurs"
  "tooltip[1]" = "(en utilisant une liste blanche ou une liste noire)."
  NONE = "Pas de restrictions"
  WHITELIST = "Liste blanche"
  BLACKLIST = "Liste noire"

  [freecam.config.servers.whitelist]
  label = "Liste blanche :"

  [freecam.config.servers.blacklist]
  label = "Liste noire :"

[freecam.config.notification]
label = "Notifications"
tooltip = "Afficher ou cacher les notifications."

  [freecam.config.notification.freecam]
  label = "Notifications de la caméra libre"
  tooltip = "Vous avertit lorsque vous entrez ou sortez de la caméra libre."

  [freecam.config.notification.tripod]
  label = "Notifications du tripode"
  tooltip = "Vous avertit lorsque vous entrez ou sortez de caméras de tripode."
