interact.mode.PLAYER = "Joueur"

[freecam.config.servers]
label = "Multijoueurs"
tooltip = "Options en rapport avec les serveurs multijoueurs."

mode.label = "Mode restreint"
mode."tooltip[0]" = "Permets ou non d'utiliser la caméra libre sur certains serveurs"
mode."tooltip[1]" = "(en utilisant une liste blanche ou une liste noire)."
